<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CineFind — STKI Film{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark-green:    #0A3323;
            --moss-green:    #839958;
            --beige:         #F7F4D5;
            --rosy-brown:    #D3968C;
            --midnight:      #105666;

            --bg:            #091e14;
            --surface:       #0f2d1c;
            --surface2:      #132f1e;
            --border:        rgba(131,153,88,0.18);
            --border-strong: rgba(131,153,88,0.35);

            --text:          #F7F4D5;
            --text-muted:    rgba(247,244,213,0.5);
            --text-dim:      rgba(247,244,213,0.72);

            --accent:        #839958;
            --accent-glow:   rgba(131,153,88,0.15);

            --highlight:     #D3968C;
            --teal:          #105666;
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        html { scroll-behavior:smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* ===== NAVBAR ===== */
        nav {
            position: sticky; top: 0; z-index: 999;
            height: 62px;
            background: rgba(9,30,20,0.94);
            backdrop-filter: blur(24px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px;
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .nav-logo-icon {
            width: 32px; height: 32px; border-radius: 8px;
            background: linear-gradient(135deg, var(--moss-green), var(--teal));
            display: flex; align-items: center; justify-content: center;
            font-size: 1rem;
        }
        .nav-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; font-weight: 700;
            color: var(--beige);
        }
        .nav-logo-badge {
            font-size: 0.6rem; font-weight: 600;
            background: rgba(131,153,88,0.15);
            color: var(--accent); padding: 2px 7px;
            border-radius: 20px; border: 1px solid var(--border);
            letter-spacing: 1px;
        }
        .nav-links { display: flex; gap: 4px; align-items: center; }
        .nav-links a {
            text-decoration: none; color: var(--text-muted);
            font-size: 0.83rem; font-weight: 500;
            padding: 6px 14px; border-radius: 8px;
            transition: all .2s;
        }
        .nav-links a:hover { color: var(--text); background: rgba(131,153,88,0.1); }
        .nav-links a.active {
            color: var(--beige);
            background: rgba(131,153,88,0.15);
            border: 1px solid var(--border);
        }
        .nav-menu-btn {
            display: none; flex-direction: column; gap: 5px;
            cursor: pointer; padding: 5px; background: none; border: none;
        }
        .nav-menu-btn span {
            display: block; width: 22px; height: 2px;
            background: var(--text-dim); border-radius: 1px;
        }

        /* ===== LAYOUT ===== */
        .container { max-width: 1240px; margin: 0 auto; padding: 0 40px; }

        /* ===== SECTION HEADER ===== */
        .section-header {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px;
        }
        .section-bar {
            width: 3px; height: 22px; border-radius: 2px;
            background: linear-gradient(to bottom, var(--accent), var(--teal));
        }
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem; font-weight: 700; color: var(--text);
        }

        .divider { height: 1px; background: var(--border); margin: 28px 0; }

        /* ===== BADGE GENRE ===== */
        .badge-genre {
            display: inline-block; padding: 2px 10px;
            border-radius: 20px; font-size: 0.7rem; font-weight: 600;
            margin: 2px;
            background: rgba(131,153,88,0.12);
            color: var(--accent);
            border: 1px solid rgba(131,153,88,0.25);
        }

        /* ===== FILM CARD ===== */
        .film-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px; overflow: hidden;
            transition: all .3s ease; cursor: pointer;
        }
        .film-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.45);
            border-color: var(--border-strong);
        }
        .film-card-poster {
            width: 100%; height: 0;
            padding-bottom: 150%;
            position: relative; overflow: hidden;
            background: linear-gradient(135deg, var(--dark-green), var(--teal));
        }
        .film-card-poster img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
            transition: transform .3s ease;
        }
        .film-card:hover .film-card-poster img { transform: scale(1.04); }
        .film-card-initials {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 3rem; color: rgba(247,244,213,0.12);
            z-index: 0;
        }
        .film-card-rating {
            position: absolute; top: 8px; right: 8px;
            background: rgba(9,30,20,0.82);
            color: var(--accent); font-size: 0.68rem;
            font-weight: 700; padding: 3px 8px; border-radius: 20px;
            border: 1px solid rgba(131,153,88,0.25); z-index: 1;
        }
        .film-card-body { padding: 14px 16px 16px; }
        .film-card-title {
            font-weight: 600; font-size: 0.86rem;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            margin-bottom: 4px; color: var(--text);
        }
        .film-card-meta { color: var(--text-muted); font-size: 0.74rem; margin-bottom: 9px; }

        /* ===== RESULT ITEM ===== */
        .result-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; padding: 18px 20px;
            margin-bottom: 10px;
            display: flex; gap: 16px; align-items: flex-start;
            transition: all .25s;
        }
        .result-item:hover { border-color: var(--border-strong); background: var(--surface2); }
        .result-poster {
            width: 72px; height: 104px; border-radius: 8px;
            overflow: hidden; flex-shrink: 0;
            background: linear-gradient(135deg, var(--dark-green), var(--teal));
            position: relative;
        }
        .result-poster img { width: 100%; height: 100%; object-fit: cover; }
        .result-poster-init {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; color: rgba(247,244,213,0.2);
        }
        .result-rank {
            min-width: 40px; height: 40px; border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 700; flex-shrink: 0;
        }
        .result-rank.top3 { background: linear-gradient(135deg, var(--accent), var(--teal)); color: var(--beige); }
        .result-rank.normal { background: rgba(131,153,88,0.08); color: var(--text-muted); border: 1px solid var(--border); }
        .result-info { flex: 1; min-width: 0; }
        .result-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
        .result-title a { color: var(--text); text-decoration: none; transition: color .2s; }
        .result-title a:hover { color: var(--accent); }
        .result-meta { color: var(--text-muted); font-size: 0.78rem; margin-bottom: 9px; }
        .result-synopsis {
            color: var(--text-dim); font-size: 0.79rem; line-height: 1.65;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden;
        }
        .result-score { text-align: center; min-width: 84px; flex-shrink: 0; }
        .score-num {
            font-family: 'Playfair Display', serif;
            font-size: 1.7rem; font-weight: 700; color: var(--accent); line-height: 1;
        }
        .score-bar-track { background: rgba(131,153,88,0.15); border-radius: 3px; height: 3px; margin: 7px 0; }
        .score-bar-fill { height: 3px; border-radius: 3px; background: linear-gradient(to right, var(--accent), var(--teal)); }

        /* ===== BUTTONS ===== */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 8px 20px; border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600; font-size: 0.84rem;
            cursor: pointer; text-decoration: none;
            transition: all .2s; border: none;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--teal));
            color: var(--beige);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(131,153,88,0.3); }
        .btn-ghost {
            background: transparent; color: var(--accent);
            border: 1px solid var(--border-strong);
        }
        .btn-ghost:hover { background: var(--accent-glow); }

        /* ===== FORM ===== */
        .search-input {
            flex: 1; min-width: 240px;
            background: rgba(247,244,213,0.04);
            border: 1.5px solid var(--border);
            border-radius: 8px; color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.92rem; padding: 10px 18px;
            outline: none; transition: all .2s;
        }
        .search-input:focus {
            border-color: var(--accent);
            background: rgba(247,244,213,0.06);
            box-shadow: 0 0 0 3px rgba(131,153,88,0.12);
        }
        .search-input::placeholder { color: var(--text-muted); }
        .search-select {
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-dim); border-radius: 8px;
            padding: 10px 14px; font-family: 'DM Sans', sans-serif;
            font-size: 0.84rem; outline: none; cursor: pointer;
            transition: border-color .2s;
        }
        .search-select:focus { border-color: var(--accent); }
        label.form-label {
            font-size: 0.7rem; color: var(--text-muted);
            display: block; margin-bottom: 5px;
            letter-spacing: 0.8px; text-transform: uppercase;
        }

        /* ===== METRIC CARD ===== */
        .metric-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 10px; padding: 16px 18px;
        }
        .metric-label { font-size: 0.68rem; color: var(--text-muted); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 5px; }
        .metric-val { font-family: 'Playfair Display', serif; font-size: 1.9rem; color: var(--accent); font-weight: 700; }

        /* ===== GRIDS ===== */
        .grid-6 { display: grid; grid-template-columns: repeat(6,1fr); gap: 14px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
        .grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }

        /* ===== TABLE ===== */
        .data-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
        .data-table th { padding: 12px 16px; color: var(--text-muted); font-weight: 500; font-size: 0.7rem; letter-spacing: 0.8px; text-transform: uppercase; border-bottom: 1px solid var(--border); text-align: left; }
        .data-table td { padding: 11px 16px; border-bottom: 1px solid rgba(131,153,88,0.07); }
        .data-table tr:hover td { background: rgba(131,153,88,0.04); }

        /* ===== ALERT ===== */
        .alert { border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; font-size: 0.86rem; }
        .alert-warn { background: rgba(211,150,140,0.08); border: 1px solid rgba(211,150,140,0.25); color: var(--rosy-brown); }
        .alert-info { background: rgba(131,153,88,0.08); border: 1px solid rgba(131,153,88,0.25); color: var(--accent); }

        /* ===== FOOTER ===== */
        footer {
            border-top: 1px solid var(--border);
            padding: 28px 40px; text-align: center;
            color: var(--text-muted); font-size: 0.78rem;
            margin-top: 64px;
        }
        .footer-logo { font-family: 'Playfair Display', serif; color: var(--accent); font-size: 1rem; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1024px) { .grid-6 { grid-template-columns: repeat(4,1fr); } }
        @media (max-width: 768px) {
            nav { padding: 0 20px; }
            .container { padding: 0 20px; }
            footer { padding: 24px 20px; }
            .grid-6 { grid-template-columns: repeat(3,1fr); }
            .grid-3 { grid-template-columns: repeat(2,1fr); }
            .grid-2 { grid-template-columns: 1fr; }
            .nav-links { display: none; }
            .nav-menu-btn { display: flex; }
            .result-item { flex-wrap: wrap; }
        }
        @media (max-width: 480px) {
            .grid-6 { grid-template-columns: repeat(2,1fr); }
            .grid-3 { grid-template-columns: 1fr; }
            .result-score { display: flex; align-items: center; gap: 12px; min-width: unset; }
        }

        main { animation: fadeUp .35s ease; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>

<nav>
    <a href="/" class="nav-logo">
        <div class="nav-logo-icon">🎬</div>
        <span class="nav-logo-text">CineFind</span>
        <span class="nav-logo-badge">STKI</span>
    </a>
    <div class="nav-links">
        <a href="/"         class="{% if active=='beranda'  %}active{% endif %}">Beranda</a>
        <a href="/cari"     class="{% if active=='cari'     %}active{% endif %}">Cari Film</a>
        <a href="/evaluasi" class="{% if active=='evaluasi' %}active{% endif %}">Evaluasi</a>
        <a href="/tentang"  class="{% if active=='tentang'  %}active{% endif %}">Tentang</a>
    </div>
    <button class="nav-menu-btn" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </button>
</nav>

<div id="mobileMenu" style="display:none; position:fixed; top:62px; left:0; right:0; z-index:998;
     background:rgba(9,30,20,0.97); border-bottom:1px solid var(--border); padding:12px 20px;">
    <a href="/"         style="display:block; padding:11px 14px; color:var(--text-dim); text-decoration:none; font-size:.9rem; border-radius:8px; margin-bottom:2px;">Beranda</a>
    <a href="/cari"     style="display:block; padding:11px 14px; color:var(--text-dim); text-decoration:none; font-size:.9rem; border-radius:8px; margin-bottom:2px;">Cari Film</a>
    <a href="/evaluasi" style="display:block; padding:11px 14px; color:var(--text-dim); text-decoration:none; font-size:.9rem; border-radius:8px; margin-bottom:2px;">Evaluasi</a>
    <a href="/tentang"  style="display:block; padding:11px 14px; color:var(--text-dim); text-decoration:none; font-size:.9rem; border-radius:8px;">Tentang</a>
</div>

<main>{% block content %}{% endblock %}</main>

<footer>
    <div class="footer-logo">CineFind</div>
    <div style="margin-top:6px;">
        Proyek UAS Temu Kembali Informasi (COM620321) &nbsp;·&nbsp;
        Universitas Lampung FMIPA &nbsp;·&nbsp; 2025–2026 Genap
    </div>
</footer>

<script>
function toggleMenu() {
    const m = document.getElementById('mobileMenu');
    m.style.display = m.style.display === 'none' ? 'block' : 'none';
}
// helper: hide broken poster img → show initials
function onImgError(img) {
    img.style.display = 'none';
    const init = img.parentElement.querySelector('.film-card-initials, .result-poster-init');
    if (init) init.style.display = 'flex';
}
</script>
</body>
</html>
